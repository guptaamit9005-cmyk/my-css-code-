<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanjus Sister</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: #ff4d6d;
            font-size: 40px;
        }

        p {
            font-size: 20px;
            color: #333;
        }

        button {
            padding: 12px 25px;
            border: none;
            background: #ff4d6d;
            color: white;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #e63956;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Kanjoos Sister 😂</h1>
        <p>My sister never shares snacks!</p>

        <button onclick="showMessage()">
            Click Me
        </button>
    </div>

    <script>
        function showMessage() {
            alert("Kanjoos Sister detected 😆");
        }
    </script>

</body>
</html>
